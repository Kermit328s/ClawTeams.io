---
openapi: "3.0.3"
info:
  title: ClawTeams Brain API
  description: >
    团队大脑（Brain）对外 API 契约。提供意图图谱管理、认知查询、
    龙虾管理、知识库查询等功能。
  version: "1.0.0"
  contact:
    name: ClawTeams
    url: https://clawteams.io

servers:
  - url: http://localhost:3000/api/v1
    description: 本地开发环境
  - url: https://api.clawteams.io/v1
    description: 生产环境

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: intent-graph
    description: 意图图谱管理
  - name: agents
    description: 龙虾账号管理
  - name: cognition
    description: 认知层查询
  - name: knowledge
    description: 知识库
  - name: teams
    description: 团队管理

paths:
  # ─── 意图图谱 ───
  /intent/goals:
    post:
      tags: [intent-graph]
      summary: 创建顶层目标
      operationId: createGoal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGoalRequest"
      responses:
        "201":
          description: 目标创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      tags: [intent-graph]
      summary: 获取目标列表
      operationId: listGoals
      parameters:
        - name: team_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed, paused, cancelled]
      responses:
        "200":
          description: 目标列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"

  /intent/goals/{goal_id}:
    get:
      tags: [intent-graph]
      summary: 获取目标详情（含子图）
      operationId: getGoal
      parameters:
        - $ref: "#/components/parameters/GoalId"
      responses:
        "200":
          description: 目标详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /intent/goals/{goal_id}/decompose:
    post:
      tags: [intent-graph]
      summary: 触发目标分解（生成任务子图）
      operationId: decomposeGoal
      parameters:
        - $ref: "#/components/parameters/GoalId"
      responses:
        "202":
          description: 分解已触发（异步执行）
          content:
            application/json:
              schema:
                type: object
                properties:
                  decomposition_id:
                    type: string
                    format: uuid

  # ─── 龙虾管理 ───
  /agents:
    get:
      tags: [agents]
      summary: 获取龙虾列表
      operationId: listAgents
      parameters:
        - name: team_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [online, offline, busy]
      responses:
        "200":
          description: 龙虾列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

    post:
      tags: [agents]
      summary: 创建龙虾账号
      operationId: createAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: 龙虾创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentWithApiKey"

  /agents/{agent_id}:
    get:
      tags: [agents]
      summary: 获取龙虾详情
      operationId: getAgent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: 龙虾详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  # ─── 认知层 ───
  /cognition/signals:
    get:
      tags: [cognition]
      summary: 获取认知信号列表
      operationId: listCognitionSignals
      parameters:
        - name: team_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: signal_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 认知信号列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CognitionSignal"

  # ─── 知识库 ───
  /knowledge/search:
    post:
      tags: [knowledge]
      summary: 知识检索
      operationId: searchKnowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query, team_id]
              properties:
                query:
                  type: string
                team_id:
                  type: string
                  format: uuid
                limit:
                  type: integer
                  default: 10
      responses:
        "200":
          description: 检索结果
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeNode"

  # ─── 团队 ───
  /teams:
    post:
      tags: [teams]
      summary: 创建团队
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: 团队创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 人类用户 JWT 认证
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Agent-API-Key
      description: 龙虾 API Key 认证

  parameters:
    GoalId:
      name: goal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AgentId:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: 未认证
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object

    CreateGoalRequest:
      type: object
      required: [title, team_id, layer]
      properties:
        title:
          type: string
          maxLength: 256
        description:
          type: string
        team_id:
          type: string
          format: uuid
        priority:
          type: string
          enum: [critical, high, medium, low]
          default: medium
        deadline:
          type: string
          format: date-time
        layer:
          type: string
          enum: [vision, strategy, phase_plan, action_item]
          description: 意图层级
        parent_id:
          type: string
          format: uuid
          description: 上级目标 ID（可选）

    Goal:
      type: object
      properties:
        goal_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, completed, paused, cancelled]
        team_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    GoalDetail:
      allOf:
        - $ref: "#/components/schemas/Goal"
        - type: object
          properties:
            tasks:
              type: array
              items:
                $ref: "#/components/schemas/TaskSummary"
            edges:
              type: array
              items:
                $ref: "#/components/schemas/GraphEdge"

    TaskSummary:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
        title:
          type: string
        state:
          type: string
        assigned_agent_id:
          type: string
          format: uuid

    GraphEdge:
      type: object
      properties:
        from_id:
          type: string
          format: uuid
        to_id:
          type: string
          format: uuid
        edge_type:
          type: string
          enum:
            - DEPENDS_ON
            - PARALLEL_WITH
            - CONDITION
            - AGGREGATES
            - LOOP_BACK

    Agent:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [online, offline, busy]
        capabilities:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: string
        team_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    AgentWithApiKey:
      allOf:
        - $ref: "#/components/schemas/Agent"
        - type: object
          properties:
            api_key:
              type: string
              description: 仅在创建时返回一次

    CreateAgentRequest:
      type: object
      required: [name, team_id, capabilities]
      properties:
        name:
          type: string
        team_id:
          type: string
          format: uuid
        capabilities:
          type: array
          items:
            type: object
            required: [name, version]
            properties:
              name:
                type: string
              version:
                type: string
              description:
                type: string

    CognitionSignal:
      type: object
      properties:
        signal_id:
          type: string
          format: uuid
        signal_type:
          type: string
        triggered_by_task_id:
          type: string
          format: uuid
        payload:
          type: object
        created_at:
          type: string
          format: date-time

    KnowledgeNode:
      type: object
      properties:
        node_id:
          type: string
          format: uuid
        content:
          type: string
        source_task_id:
          type: string
          format: uuid
        relevance_score:
          type: number
        created_at:
          type: string
          format: date-time

    CreateTeamRequest:
      type: object
      required: [name, owner_id]
      properties:
        name:
          type: string
        owner_id:
          type: string
          format: uuid
        description:
          type: string

    Team:
      type: object
      properties:
        team_id:
          type: string
          format: uuid
        name:
          type: string
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
