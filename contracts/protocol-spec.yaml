---
# 龙虾 ⇔ 大脑通信协议规范
# 涵盖：注册、心跳上报、事件订阅
title: ClawTeams Agent-Brain Protocol
version: "1.0"
description: >
  定义龙虾（Agent）与团队大脑（Brain）之间的通信协议。
  包括注册、心跳上报、任务下发、状态回传、事件订阅等。

transport:
  primary: websocket
  fallback: http-long-polling
  encoding: json
  heartbeat_interval_ms: 30000
  reconnect_backoff:
    initial_ms: 1000
    max_ms: 30000
    multiplier: 2

# ─── 消息帧格式 ───
message_frame:
  type: object
  required:
    - msg_type
    - msg_id
    - timestamp
  properties:
    msg_type:
      type: string
      description: 消息类型
    msg_id:
      type: string
      format: uuid
      description: 消息唯一标识
    timestamp:
      type: string
      format: date-time
    reply_to:
      type: string
      format: uuid
      description: 回复的消息 ID（请求-响应模式）
    payload:
      type: object

# ─── 协议消息定义 ───
messages:

  # --- 注册 ---
  agent.register:
    direction: agent -> brain
    description: 龙虾首次连接时注册自身能力
    payload:
      type: object
      required:
        - agent_id
        - api_key
        - capabilities
        - runtime
      properties:
        agent_id:
          type: string
          format: uuid
        api_key:
          type: string
          description: 龙虾 API Key
        capabilities:
          type: array
          items:
            type: object
            required:
              - name
              - version
            properties:
              name:
                type: string
              version:
                type: string
              description:
                type: string
              input_schema:
                type: object
              output_schema:
                type: object
        runtime:
          type: object
          properties:
            container_id:
              type: string
            hostname:
              type: string
            platform:
              type: string
            memory_mb:
              type: integer
            cpu_cores:
              type: integer

  agent.register_ack:
    direction: brain -> agent
    description: 注册确认
    payload:
      type: object
      required:
        - success
        - session_id
      properties:
        success:
          type: boolean
        session_id:
          type: string
          format: uuid
          description: 会话标识，后续通信需携带
        assigned_roles:
          type: array
          items:
            type: string
        error:
          type: string

  # --- 心跳 ---
  agent.heartbeat:
    direction: agent -> brain
    description: 定期心跳上报
    payload:
      type: object
      required:
        - agent_id
        - session_id
        - status
      properties:
        agent_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [idle, busy, overloaded, shutting_down]
        current_task_id:
          type: string
          format: uuid
        resource_usage:
          type: object
          properties:
            cpu_percent:
              type: number
            memory_percent:
              type: number
            disk_percent:
              type: number

  agent.heartbeat_ack:
    direction: brain -> agent
    description: 心跳确认
    payload:
      type: object
      properties:
        received:
          type: boolean
        server_time:
          type: string
          format: date-time

  # --- 任务下发 ---
  task.assign:
    direction: brain -> agent
    description: 大脑向龙虾下发任务
    payload:
      type: object
      required:
        - task_id
        - task_type
        - input
        - deadline
      properties:
        task_id:
          type: string
          format: uuid
        task_type:
          type: string
        input:
          type: object
          description: 任务输入（符合 TaskInput schema）
        priority:
          type: string
          enum: [critical, high, medium, low]
          default: medium
        deadline:
          type: string
          format: date-time
        context:
          type: object
          description: 上下文信息

  # --- 状态上报 ---
  task.report:
    direction: agent -> brain
    description: 龙虾上报任务执行状态
    payload:
      type: object
      required:
        - task_id
        - agent_id
        - state
      properties:
        task_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        state:
          type: string
          enum: [accepted, running, completed, failed, blocked, human_required]
        progress_percent:
          type: integer
          minimum: 0
          maximum: 100
        state_unit:
          description: 完成时附带的最小状态单元
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean

  # --- 事件订阅 ---
  event.subscribe:
    direction: agent -> brain
    description: 龙虾订阅特定类型的事件
    payload:
      type: object
      required:
        - agent_id
        - event_patterns
      properties:
        agent_id:
          type: string
          format: uuid
        event_patterns:
          type: array
          items:
            type: string
            description: 事件类型模式，支持通配符，例如 "task.*"

  event.subscribe_ack:
    direction: brain -> agent
    description: 订阅确认
    payload:
      type: object
      properties:
        subscribed_patterns:
          type: array
          items:
            type: string

  event.push:
    direction: brain -> agent
    description: 向已订阅的龙虾推送事件
    payload:
      type: object
      required:
        - event
      properties:
        event:
          description: 符合 event-schema.yaml 的事件对象

# ─── 错误码 ───
error_codes:
  AUTH_FAILED: "认证失败，API Key 无效或已过期"
  SESSION_EXPIRED: "会话已过期，请重新注册"
  RATE_LIMITED: "请求过于频繁"
  TASK_NOT_FOUND: "任务不存在"
  CAPABILITY_MISMATCH: "龙虾能力与任务需求不匹配"
  INTERNAL_ERROR: "内部错误"
